name: Alertas de tipo de cambio (BOB)

on:
  schedule:
    # Cada 480 minutos (8 horas). GitHub Actions usa UTC; Bolivia es UTC-4 todo el año.
    - cron: "*/480 * * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Mandar un mensaje de prueba ahora, sin esperar un cambio real"
        type: boolean
        default: false

jobs:
  check-rates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Revisar tipos de cambio y avisar por Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_MODE: ${{ github.event.inputs.test_mode }}
        run: python scripts/check_rates.py

      - name: Guardar el estado actualizado en el repo
        run: |
          git config user.name "rates-bot"
          git config user.email "rates-bot@users.noreply.github.com"
          git add state/rates_state.json
          git diff --quiet --cached || git commit -m "Actualiza estado de tipos de cambio [skip ci]"
          git push
